<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live QR Scanner — Verda</title>
  <meta name="description" content="Scan a Verda product QR code using your camera to verify authenticity.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- html5-qrcode: reliable, battle-tested QR scanning library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-900: #0a2e0f;
      --green-700: #2e7d32;
      --green-500: #4caf50;
      --green-400: #66bb6a;
      --surface:    rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.10);
      --text-primary: #f1f8f2;
      --text-muted:   #9dbfa0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--green-900);
      color: var(--text-primary);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(46,125,50,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(102,187,106,0.15) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── Navbar ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      background: rgba(10,46,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-primary); text-decoration: none;
    }
    .brand-leaf {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--green-500), var(--green-400));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      box-shadow: 0 0 14px rgba(102,187,106,0.4);
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); color: var(--green-400); }

    /* ── Main ── */
    .main {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px 80px;
      text-align: center;
    }

    .scanner-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(76,175,80,0.12);
      border: 1px solid rgba(76,175,80,0.3);
      color: var(--green-400);
      padding: 6px 16px; border-radius: 100px;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.9rem; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 10px;
      background: linear-gradient(135deg, #ffffff 40%, #a5d6a7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 0.9rem; color: var(--text-muted);
      max-width: 380px; margin: 0 auto 32px; line-height: 1.65;
    }

    /* ── Scanner container ── */
    .scanner-wrap {
      position: relative;
      width: 100%; max-width: 420px;
      margin-bottom: 24px;
    }

    /* html5-qrcode renders into #reader — we style it */
    #reader {
      width: 100% !important;
      border-radius: 18px !important;
      overflow: hidden;
      border: 2px solid rgba(76,175,80,0.4) !important;
      box-shadow: 0 0 0 6px rgba(76,175,80,0.08), 0 24px 60px rgba(0,0,0,0.5);
      background: #000;
    }

    /* Override the library's internal styles */
    #reader video {
      border-radius: 16px !important;
      object-fit: cover !important;
    }
    #reader img { display: none !important; }

    /* Hide the library's default scan region box and replace with ours */
    #reader__scan_region { position: relative; }
    #reader__dashboard { display: none !important; }
    #reader__dashboard_section_csr { display: none !important; }

    /* Corner bracket overlay */
    .overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      border-radius: 16px;
      z-index: 10;
    }
    .corner {
      position: absolute;
      width: 32px; height: 32px;
      border-color: var(--green-400);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 20px; left: 20px; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 20px; right: 20px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 20px; left: 20px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 20px; right: 20px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

    .scan-line {
      position: absolute;
      left: 20px; right: 20px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--green-400), transparent);
      animation: scanAnim 2s linear infinite;
      display: none;
    }
    @keyframes scanAnim {
      0%   { top: 20px; }
      100% { top: calc(100% - 20px); }
    }

    /* ── Placeholder (before camera starts) ── */
    .placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 300px;
      color: var(--text-muted);
      gap: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      border: 2px dashed var(--border);
    }
    .placeholder i { font-size: 3rem; opacity: 0.35; }
    .placeholder span { font-size: 0.85rem; }

    /* ── Start button ── */
    .btn-start {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 15px 36px;
      background: linear-gradient(135deg, var(--green-700), var(--green-500));
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(76,175,80,0.4);
      transition: all 0.25s;
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(76,175,80,0.55); }
    .btn-start:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Status ── */
    .status-row {
      display: none;
      align-items: center; gap: 8px;
      font-size: 0.85rem; color: var(--text-muted);
      margin-top: 16px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green-400);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.65); }
    }

    /* ── Success ── */
    .success-row {
      display: none;
      align-items: center; gap: 8px;
      font-size: 0.88rem; color: #81c784;
      margin-top: 16px;
    }

    /* ── Error ── */
    .error-box {
      display: none;
      align-items: center; gap: 10px;
      background: rgba(244,67,54,0.1);
      border: 1px solid rgba(244,67,54,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem; color: #ef9a9a;
      margin-top: 16px;
      max-width: 420px;
      text-align: left;
    }

    @media (max-width: 480px) {
      .navbar { padding: 12px 16px; }
      .main { padding: 36px 16px 60px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="brand-leaf">🌿</div>
      Verda
    </a>
    <a href="/" class="btn-back">
      <i class="bi bi-arrow-left"></i> Home
    </a>
  </nav>

  <div class="main">
    <div class="scanner-badge">
      <i class="bi bi-camera-fill"></i>
      Live QR Scanner
    </div>
    <h1>Scan Your Product</h1>
    <p class="subtitle">Point your camera at a Verda product QR code to instantly verify its authenticity.</p>

    <!-- Camera area -->
    <div class="scanner-wrap">

      <!-- Placeholder shown before camera starts -->
      <div class="placeholder" id="placeholder">
        <i class="bi bi-camera"></i>
        <span>Press the button below to start</span>
      </div>

      <!-- html5-qrcode renders the video here -->
      <div id="reader" style="display:none;"></div>

      <!-- Visual overlay (corners + scan line) -->
      <div class="overlay" id="overlay" style="display:none;">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line" id="scanLine"></div>
      </div>

    </div>

    <button class="btn-start" id="startBtn" onclick="startScanner()">
      <i class="bi bi-camera-fill"></i> Start Camera
    </button>

    <div class="status-row" id="statusRow">
      <div class="status-dot"></div>
      Camera active — point at a QR code
    </div>

    <div class="success-row" id="successRow">
      <i class="bi bi-check-circle-fill"></i>
      QR detected! Redirecting…
    </div>

    <div class="error-box" id="errorBox">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="errorMsg"></span>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let redirecting = false;
    let detectionAttempts = 0;

    function startScanner() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Starting…';

      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('scanLine').style.display = 'block';

      html5QrCode = new Html5Qrcode('reader');

      const config = {
        fps: 10,
        qrbox: { width: 280, height: 280 },
        aspectRatio: 1.0,
        rememberLastUsedCamera: true
      };

      // Try rear camera first, then front
      console.log('🎥 Attempting to start scanner...');
      
      html5QrCode.start(
        { facingMode: 'environment' },
        config,
        onScanSuccess,
        onScanFailure
      )
      .then(function() {
        console.log('✅ Camera started (rear)');
        document.getElementById('statusRow').style.display = 'flex';
      })
      .catch(function(err) {
        console.warn('⚠️ Rear camera failed:', err);
        
        // Try front camera
        html5QrCode.start(
          { facingMode: 'user' },
          config,
          onScanSuccess,
          onScanFailure
        )
        .then(function() {
          console.log('✅ Camera started (front)');
          document.getElementById('statusRow').style.display = 'flex';
        })
        .catch(function(err2) {
          console.error('❌ Camera failed:', err2);
          showError('Camera error: ' + err2.message);
          resetScanner(btn);
        });
      });
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (redirecting) return;
      redirecting = true;

      console.log('✅ QR Code detected:', decodedText);

      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
      }

      document.getElementById('statusRow').style.display = 'none';
      document.getElementById('scanLine').style.display = 'none';
      document.getElementById('successRow').style.display = 'flex';

      setTimeout(function() {
        window.location.href = decodedText;
      }, 500);
    }

    function onScanFailure(error) {
      detectionAttempts++;
      // Only log every 100 attempts to avoid spam
      if (detectionAttempts % 100 === 0) {
        console.log('🔍 Scanning... (' + detectionAttempts + ' attempts)');
      }
    }

    function resetScanner(btn) {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-camera-fill"></i> Start Camera';
      document.getElementById('reader').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.style.display = 'flex';
      document.getElementById('errorMsg').textContent = msg;
      console.error(msg);
    }

    // Add stop button functionality
    window.addEventListener('beforeunload', function() {
      if (html5QrCode && !redirecting) {
        html5QrCode.stop().catch(() => {});
      }
    });
  </script>

</body>
</html>
