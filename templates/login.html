<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Verda</title>
  <meta name="description" content="Secure admin login for Verda product verification dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-900: #0a2e0f;
      --green-700: #2e7d32;
      --green-500: #4caf50;
      --green-400: #66bb6a;
      --surface:    rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.10);
      --text-primary: #f1f8f2;
      --text-muted:   #9dbfa0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--green-900);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(46,125,50,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(102,187,106,0.15) 0%, transparent 55%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      backdrop-filter: blur(16px);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--green-700), var(--green-500));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 14px;
      box-shadow: 0 0 24px rgba(76,175,80,0.4);
    }
    .login-logo h1 {
      font-size: 1.55rem; font-weight: 800;
      letter-spacing: -0.5px;
    }
    .login-logo p {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Error */
    .error-alert {
      display: flex; align-items: center; gap: 10px;
      background: rgba(244,67,54,0.1);
      border: 1px solid rgba(244,67,54,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.85rem;
      color: #ef9a9a;
      margin-bottom: 20px;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .input-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .input-icon {
      position: absolute; left: 14px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .form-input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: var(--green-500);
      box-shadow: 0 0 0 4px rgba(76,175,80,0.15);
    }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute; right: 14px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 0.95rem;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--text-primary); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green-700), var(--green-500));
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(76,175,80,0.35);
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(76,175,80,0.5); }

    .hint {
      text-align: center;
      margin-top: 18px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .hint code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px; border-radius: 4px;
      font-family: 'Courier New', monospace; font-size: 0.85em;
    }

    .back-link {
      display: block; text-align: center; margin-top: 20px;
      color: var(--text-muted); font-size: 0.84rem;
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--green-400); }

    @media (max-width: 480px) {
      .login-card { padding: 28px 22px 26px; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-icon">🌿</div>
        <h1>Verda Admin</h1>
        <p>Sign in to access the dashboard</p>
      </div>

      {% if error %}
      <div class="error-alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <i class="bi bi-person input-icon"></i>
            <input id="username" type="text" name="username" class="form-input"
                   placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input id="password" type="password" name="password" class="form-input"
                   placeholder="Enter password" required autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <div class="hint">Default credentials: <code>admin</code> / <code>verda123</code></div>
    </div>

    <a href="/" class="back-link">
      <i class="bi bi-arrow-left" style="font-size:0.8rem;"></i> Back to home
    </a>
  </div>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
